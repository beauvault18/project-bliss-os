<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      'unsafe-eval' is required because Angular runs in JIT mode and compiles
      templates at runtime via new Function(). 'blob:' in worker-src is reserved
      for future WebGL loaders (Draco/KTX); v1 uses none. See README.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; worker-src 'self';"
    />
    <title>Project Bliss OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
